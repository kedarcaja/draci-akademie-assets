<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0e05"/>
      <stop offset="100%" stop-color="#080503"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="blurSm"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="480" height="320" fill="url(#bg)"/>
  <ellipse cx="240" cy="180" rx="220" ry="160" fill="url(#warmGlow)" filter="url(#blur)"/>

  <!-- COLOR WHEEL (large, central element) -->
  <!-- Outer ring segments - color wheel -->
  <path d="M240 80 A100 100 0 0 1 326 130 L240 170 Z" fill="#ff4444" opacity="0.7"/>
  <path d="M326 130 A100 100 0 0 1 326 230 L240 170 Z" fill="#ff8800" opacity="0.75"/>
  <path d="M326 230 A100 100 0 0 1 240 280 L240 170 Z" fill="#ffdd00" opacity="0.7"/>
  <path d="M240 280 A100 100 0 0 1 154 230 L240 170 Z" fill="#44bb44" opacity="0.65"/>
  <path d="M154 230 A100 100 0 0 1 154 130 L240 170 Z" fill="#4488ff" opacity="0.7"/>
  <path d="M154 130 A100 100 0 0 1 240 80 L240 170 Z" fill="#aa44ff" opacity="0.65"/>

  <!-- Slightly darker overlay to desaturate -->
  <circle cx="240" cy="180" r="100" fill="#0a0604" opacity="0.4"/>

  <!-- Inner dark circle -->
  <circle cx="240" cy="180" r="55" fill="#120a04" opacity="0.95"/>
  <circle cx="240" cy="180" r="52" fill="none" stroke="#C9943A" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Center paint brush stroke / swirl -->
  <path d="M218 162 C225 155 248 155 255 165 C260 172 258 185 248 188 C238 191 228 186 222 178 C216 170 216 168 218 162 Z" fill="#C9943A" opacity="0.15"/>
  <path d="M225 158 C232 154 250 157 255 167" stroke="#C9943A" stroke-width="2" fill="none" stroke-opacity="0.3"/>

  <!-- Paint brushes arranged around -->
  <!-- Brush 1 (red) -->
  <g transform="rotate(-40 240 180)">
    <rect x="232" y="55" width="8" height="55" rx="2" fill="#8B6914" opacity="0.8"/>
    <ellipse cx="236" cy="57" rx="5" ry="9" fill="#ff4444" opacity="0.8"/>
    <rect x="232" y="108" width="8" height="12" rx="1" fill="#5a3a10" opacity="0.7"/>
  </g>
  <!-- Brush 2 (blue) -->
  <g transform="rotate(40 240 180)">
    <rect x="232" y="55" width="8" height="55" rx="2" fill="#8B6914" opacity="0.8"/>
    <ellipse cx="236" cy="57" rx="5" ry="9" fill="#4488ff" opacity="0.8"/>
    <rect x="232" y="108" width="8" height="12" rx="1" fill="#5a3a10" opacity="0.7"/>
  </g>
  <!-- Brush 3 (yellow, straight up) -->
  <rect x="236" y="52" width="8" height="58" rx="2" fill="#8B6914" opacity="0.8"/>
  <ellipse cx="240" cy="54" rx="5" ry="9" fill="#ffdd00" opacity="0.85"/>
  <rect x="236" y="108" width="8" height="14" rx="1" fill="#5a3a10" opacity="0.7"/>

  <!-- Paint drops / splashes -->
  <!-- Red splatter near wheel -->
  <circle cx="320" cy="120" r="8" fill="#ff4444" opacity="0.5"/>
  <circle cx="328" cy="112" r="3" fill="#ff4444" opacity="0.4"/>
  <circle cx="312" cy="115" r="4" fill="#ff4444" opacity="0.35"/>
  <!-- Blue splatter -->
  <circle cx="158" cy="230" r="7" fill="#4488ff" opacity="0.45"/>
  <circle cx="150" cy="238" r="3" fill="#4488ff" opacity="0.35"/>
  <!-- Yellow splatter -->
  <circle cx="310" cy="248" r="6" fill="#ffdd00" opacity="0.4"/>
  <circle cx="316" cy="240" r="2.5" fill="#ffdd00" opacity="0.35"/>
  <!-- Orange -->
  <circle cx="170" cy="120" r="5" fill="#ff8800" opacity="0.4"/>

  <!-- Paint jars / pots arranged at bottom -->
  <!-- Jar 1 red -->
  <rect x="100" y="255" width="28" height="40" rx="4" fill="#1a0a0a" opacity="0.9"/>
  <ellipse cx="114" cy="255" rx="14" ry="5" fill="#2a1010" opacity="0.9"/>
  <ellipse cx="114" cy="254" rx="12" ry="4" fill="#ff4444" opacity="0.5"/>
  <!-- Jar 2 blue -->
  <rect x="140" y="260" width="28" height="35" rx="4" fill="#0a0a1a" opacity="0.9"/>
  <ellipse cx="154" cy="260" rx="14" ry="5" fill="#101020" opacity="0.9"/>
  <ellipse cx="154" cy="259" rx="12" ry="4" fill="#4488ff" opacity="0.5"/>
  <!-- Jar 3 yellow -->
  <rect x="310" y="258" width="28" height="38" rx="4" fill="#1a1a0a" opacity="0.9"/>
  <ellipse cx="324" cy="258" rx="14" ry="5" fill="#2a2a10" opacity="0.9"/>
  <ellipse cx="324" cy="257" rx="12" ry="4" fill="#ffdd00" opacity="0.5"/>
  <!-- Jar 4 green -->
  <rect x="350" y="263" width="28" height="33" rx="4" fill="#0a1a0a" opacity="0.9"/>
  <ellipse cx="364" cy="263" rx="14" ry="5" fill="#102010" opacity="0.9"/>
  <ellipse cx="364" cy="262" rx="12" ry="4" fill="#44bb44" opacity="0.5"/>

  <!-- Light rays from color wheel center -->
  <line x1="240" y1="180" x2="345" y2="110" stroke="#ff8800" stroke-opacity="0.08" stroke-width="20"/>
  <line x1="240" y1="180" x2="145" y2="115" stroke="#aa44ff" stroke-opacity="0.08" stroke-width="20"/>
  <line x1="240" y1="180" x2="240" y2="55" stroke="#ffdd00" stroke-opacity="0.06" stroke-width="16"/>

  <!-- Color swatches bottom strip -->
  <rect x="80" y="295" width="40" height="12" rx="2" fill="#ff4444" opacity="0.6"/>
  <rect x="125" y="295" width="40" height="12" rx="2" fill="#ff8800" opacity="0.6"/>
  <rect x="170" y="295" width="40" height="12" rx="2" fill="#ffdd00" opacity="0.6"/>
  <rect x="215" y="295" width="40" height="12" rx="2" fill="#44bb44" opacity="0.6"/>
  <rect x="260" y="295" width="40" height="12" rx="2" fill="#4488ff" opacity="0.6"/>
  <rect x="305" y="295" width="40" height="12" rx="2" fill="#aa44ff" opacity="0.6"/>
  <rect x="350" y="295" width="50" height="12" rx="2" fill="#C9943A" opacity="0.7"/>

  <!-- Label -->
  <text x="240" y="315" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#C9943A" fill-opacity="0.35" letter-spacing="2">AKADEMIE BAREV — 480 × 320 px</text>
</svg>
