<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111008"/>
      <stop offset="100%" stop-color="#060504"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="candleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8B84B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="blurSm"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="480" height="320" fill="url(#bg)"/>
  <ellipse cx="240" cy="240" rx="240" ry="120" fill="url(#warmGlow)" filter="url(#blur)"/>

  <!-- Stone wall texture background -->
  <!-- Large stone blocks -->
  <rect x="0" y="0" width="480" height="320" fill="none"/>
  <!-- Horizontal mortar lines -->
  <line x1="0" y1="50" x2="480" y2="50" stroke="#0d0c0a" stroke-width="3" opacity="0.7"/>
  <line x1="0" y1="105" x2="480" y2="105" stroke="#0d0c0a" stroke-width="3" opacity="0.7"/>
  <line x1="0" y1="160" x2="480" y2="160" stroke="#0d0c0a" stroke-width="3" opacity="0.7"/>
  <line x1="0" y1="215" x2="480" y2="215" stroke="#0d0c0a" stroke-width="3" opacity="0.7"/>
  <!-- Vertical mortar lines row 1 -->
  <line x1="80" y1="0" x2="80" y2="50" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="0" x2="220" y2="50" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <line x1="360" y1="0" x2="360" y2="50" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <!-- row 2 -->
  <line x1="150" y1="50" x2="150" y2="105" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="50" x2="300" y2="105" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <line x1="420" y1="50" x2="420" y2="105" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <!-- row 3 -->
  <line x1="80" y1="105" x2="80" y2="160" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <line x1="260" y1="105" x2="260" y2="160" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="105" x2="400" y2="160" stroke="#0d0c0a" stroke-width="2" opacity="0.5"/>

  <!-- Wall stone fill -->
  <rect x="0" y="0" width="480" height="215" fill="#13120e" opacity="0.7"/>

  <!-- Workbench surface -->
  <rect x="0" y="215" width="480" height="20" rx="0" fill="#2a2010"/>
  <rect x="0" y="227" width="480" height="8" rx="0" fill="#1a1408"/>

  <!-- Shelf on wall -->
  <rect x="30" y="95" width="200" height="10" rx="2" fill="#2a2010" opacity="0.9"/>
  <rect x="270" y="85" width="180" height="10" rx="2" fill="#2a2010" opacity="0.9"/>

  <!-- Items on left shelf -->
  <!-- Scroll -->
  <rect x="45" y="70" width="30" height="25" rx="8" fill="#DEC991" opacity="0.25"/>
  <rect x="42" y="71" width="8" height="23" rx="4" fill="#a8793a" opacity="0.4"/>
  <rect x="67" y="71" width="8" height="23" rx="4" fill="#a8793a" opacity="0.4"/>
  <!-- Ink pot -->
  <ellipse cx="100" cy="94" rx="9" ry="4" fill="#1a1408" opacity="0.9"/>
  <rect x="91" y="76" width="18" height="18" rx="3" fill="#1a1408" opacity="0.9"/>
  <ellipse cx="100" cy="76" rx="9" ry="3" fill="#050400" opacity="0.9"/>
  <!-- Skull decoration -->
  <ellipse cx="150" cy="83" rx="12" ry="11" fill="#2a2510" opacity="0.7"/>
  <ellipse cx="150" cy="90" rx="9" ry="7" fill="#2a2510" opacity="0.7"/>
  <ellipse cx="145" cy="81" rx="4" ry="4" fill="#0d0c08" opacity="0.8"/>
  <ellipse cx="155" cy="81" rx="4" ry="4" fill="#0d0c08" opacity="0.8"/>
  <line x1="141" y1="92" x2="141" y2="96" stroke="#1a1808" stroke-width="2" opacity="0.7"/>
  <line x1="147" y1="92" x2="147" y2="96" stroke="#1a1808" stroke-width="2" opacity="0.7"/>
  <line x1="153" y1="92" x2="153" y2="96" stroke="#1a1808" stroke-width="2" opacity="0.7"/>
  <line x1="159" y1="92" x2="159" y2="96" stroke="#1a1808" stroke-width="2" opacity="0.7"/>
  <!-- Book -->
  <rect x="175" y="65" width="40" height="30" rx="2" fill="#8B1A1A" opacity="0.6"/>
  <rect x="173" y="65" width="6" height="30" rx="1" fill="#6a1010" opacity="0.7"/>
  <line x1="183" y1="72" x2="208" y2="72" stroke="#E8B84B" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="183" y1="78" x2="208" y2="78" stroke="#E8B84B" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="183" y1="84" x2="208" y2="84" stroke="#E8B84B" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Items on right shelf -->
  <!-- Potion bottles -->
  <rect x="280" y="62" width="16" height="23" rx="5" fill="#1a3a1a" opacity="0.8"/>
  <ellipse cx="288" cy="62" rx="8" ry="4" fill="#0d1a0d" opacity="0.9"/>
  <rect x="285" y="55" width="6" height="8" rx="2" fill="#2a2a1a" opacity="0.7"/>
  <ellipse cx="288" cy="75" rx="5" ry="3" fill="#44bb44" opacity="0.3" filter="url(#blurSm)"/>
  <!-- Potion 2 -->
  <rect x="304" y="58" width="20" height="27" rx="6" fill="#1a1a3a" opacity="0.8"/>
  <ellipse cx="314" cy="58" rx="10" ry="4" fill="#0d0d1a" opacity="0.9"/>
  <rect x="311" y="50" width="6" height="9" rx="2" fill="#2a2a2a" opacity="0.7"/>
  <ellipse cx="314" cy="72" rx="6" ry="3" fill="#4488ff" opacity="0.3" filter="url(#blurSm)"/>
  <!-- Hourglass -->
  <path d="M355 62 L375 62 L368 80 L375 95 L355 95 L362 80 Z" fill="#2a2510" opacity="0.75"/>
  <rect x="353" y="60" width="24" height="5" rx="1" fill="#3a3015" opacity="0.7"/>
  <rect x="353" y="95" width="24" height="5" rx="1" fill="#3a3015" opacity="0.7"/>
  <ellipse cx="365" cy="80" rx="5" ry="3" fill="#C9943A" opacity="0.3"/>
  <!-- Candle -->
  <rect x="422" y="65" width="12" height="30" rx="2" fill="#DEC991" opacity="0.5"/>
  <ellipse cx="428" cy="65" rx="6" ry="3" fill="#E8D5A3" opacity="0.4"/>
  <line x1="428" y1="55" x2="428" y2="65" stroke="#3a2a10" stroke-width="2" opacity="0.6"/>
  <!-- Flame -->
  <ellipse cx="428" cy="53" rx="4" ry="8" fill="#E8B84B" opacity="0.8" filter="url(#softglow)"/>
  <ellipse cx="428" cy="55" rx="2" ry="4" fill="#ffeeaa" opacity="0.9"/>
  <!-- Candle light glow -->
  <ellipse cx="428" cy="55" rx="40" ry="35" fill="url(#candleGlow)" filter="url(#blur)" opacity="0.5"/>

  <!-- DIORAMA on workbench center (main feature) -->
  <!-- Diorama base board -->
  <rect x="120" y="188" width="240" height="30" rx="3" fill="#2a1f0a"/>
  <rect x="122" y="190" width="236" height="26" rx="2" fill="#1e1608"/>
  <!-- Terrain elements on diorama -->
  <!-- Small hill/rock -->
  <ellipse cx="200" cy="190" rx="35" ry="14" fill="#2a2510" opacity="0.85"/>
  <ellipse cx="200" cy="188" rx="32" ry="12" fill="#302b14" opacity="0.75"/>
  <!-- Tiny trees -->
  <rect x="182" y="172" width="4" height="18" rx="1" fill="#1a1408" opacity="0.8"/>
  <ellipse cx="184" cy="170" rx="8" ry="10" fill="#1a3a1a" opacity="0.8"/>
  <rect x="212" y="176" width="3" height="14" rx="1" fill="#1a1408" opacity="0.8"/>
  <ellipse cx="213" cy="174" rx="6" ry="8" fill="#1a3a1a" opacity="0.7"/>
  <!-- Castle tower on diorama -->
  <rect x="225" y="160" width="30" height="32" rx="0" fill="#2a2510" opacity="0.9"/>
  <rect x="222" y="155" width="8" height="12" rx="0" fill="#2a2510" opacity="0.85"/>
  <rect x="245" y="155" width="8" height="12" rx="0" fill="#2a2510" opacity="0.85"/>
  <!-- Castle battlements -->
  <rect x="223" y="152" width="5" height="4" fill="#2a2510" opacity="0.85"/>
  <rect x="231" y="152" width="5" height="4" fill="#2a2510" opacity="0.85"/>
  <rect x="239" y="152" width="5" height="4" fill="#2a2510" opacity="0.85"/>
  <rect x="247" y="152" width="5" height="4" fill="#2a2510" opacity="0.85"/>
  <!-- Castle window light -->
  <rect x="234" y="168" width="8" height="10" rx="1" fill="#C9943A" opacity="0.4"/>
  <rect x="234" y="168" width="8" height="10" rx="1" fill="#C9943A" opacity="0.2" filter="url(#softglow)"/>
  <!-- Tiny knight figurine -->
  <rect x="194" y="179" width="6" height="10" rx="1" fill="#3a3020" opacity="0.9"/>
  <ellipse cx="197" cy="178" rx="4" ry="4" fill="#3a3020" opacity="0.9"/>
  <!-- Tools on workbench -->
  <line x1="90" y1="213" x2="90" y2="230" stroke="#5a4a2a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="213" x2="80" y2="228" stroke="#5a4a2a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Knife/sculpting tool -->
  <path d="M390 215 L420 213 L422 217 L390 220 Z" fill="#6a6050" opacity="0.7"/>
  <rect x="420" y="213" width="18" height="6" rx="1" fill="#8B6914" opacity="0.7"/>

  <!-- Ambient dust particles -->
  <circle cx="170" cy="150" r="1" fill="#E8B84B" opacity="0.3"/>
  <circle cx="310" cy="130" r="1.5" fill="#E8B84B" opacity="0.2"/>
  <circle cx="350" cy="160" r="1" fill="#E8B84B" opacity="0.25"/>

  <!-- Label -->
  <text x="240" y="308" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#C9943A" fill-opacity="0.35" letter-spacing="2">PROJEKTOVÁ DÍLNA — 480 × 320 px</text>
</svg>
