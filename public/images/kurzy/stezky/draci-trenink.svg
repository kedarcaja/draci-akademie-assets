<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#03050e"/>
    </radialGradient>
    <radialGradient id="dragGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aab8e8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#aab8e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="blurSm"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="480" height="320" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="40" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="90" cy="18" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="150" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="310" cy="25" r="1" fill="white" opacity="0.6"/>
  <circle cx="380" cy="15" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="440" cy="35" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.5"/>
  <circle cx="260" cy="50" r="1" fill="white" opacity="0.3"/>
  <circle cx="60" cy="60" r="1" fill="white" opacity="0.4"/>
  <circle cx="420" cy="60" r="1" fill="white" opacity="0.5"/>

  <!-- Moon -->
  <circle cx="380" cy="55" r="30" fill="#aab8e8" opacity="0.15" filter="url(#blur)"/>
  <circle cx="380" cy="55" r="20" fill="#c8d4f4" opacity="0.2"/>
  <circle cx="388" cy="50" r="14" fill="#080d1a"/> <!-- crescent mask -->

  <!-- Castle silhouette background -->
  <path d="M0 320 L0 200 L30 200 L30 180 L45 180 L45 160 L55 160 L55 180 L70 180 L70 200 L90 200 L90 175 L105 175 L105 155 L115 155 L115 140 L125 140 L125 155 L135 155 L135 175 L150 175 L150 195 L180 195 L180 200 L480 200 L480 320 Z" fill="#0a0f1e" opacity="0.9"/>
  <!-- Tower windows (lit) -->
  <rect x="108" y="162" width="8" height="10" rx="1" fill="#C9943A" opacity="0.4"/>
  <rect x="37" y="185" width="8" height="10" rx="1" fill="#C9943A" opacity="0.3"/>

  <!-- Dragon glow behind -->
  <ellipse cx="240" cy="160" rx="150" ry="100" fill="url(#dragGlow)" filter="url(#blur)"/>

  <!-- LARGE DRAGON (main, posed) -->
  <!-- Dragon body -->
  <path d="M140 200 C130 170 140 140 160 128 C180 116 210 120 225 138 C240 155 242 180 235 200 Z" fill="#1a3a5a" opacity="0.95"/>
  <!-- Dragon belly lighter -->
  <path d="M160 195 C155 175 160 155 170 145 C180 138 195 142 200 155 C205 168 203 188 198 200 Z" fill="#1e4a70" opacity="0.7"/>
  <!-- Scales suggestion -->
  <path d="M162 170 C158 162 162 154 168 152" stroke="#2a5a7a" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M170 165 C166 157 170 149 176 147" stroke="#2a5a7a" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M178 168 C174 160 178 152 184 150" stroke="#2a5a7a" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Wings spread wide -->
  <!-- Left wing -->
  <path d="M155 145 C120 120 60 105 30 120 C50 140 100 145 140 148 Z" fill="#162a40" opacity="0.9"/>
  <path d="M155 145 C140 125 100 115 60 118 C80 132 120 138 148 142 Z" fill="#1e3a54" opacity="0.5"/>
  <!-- Wing membrane veins left -->
  <line x1="140" y1="148" x2="80" y2="118" stroke="#2a4a64" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="143" y1="144" x2="50" y2="122" stroke="#2a4a64" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Right wing -->
  <path d="M225 138 C265 110 340 95 380 112 C355 135 300 140 248 145 Z" fill="#162a40" opacity="0.9"/>
  <path d="M225 138 C260 115 320 108 368 115 C345 132 300 138 240 143 Z" fill="#1e3a54" opacity="0.5"/>
  <!-- Wing membrane veins right -->
  <line x1="240" y1="145" x2="310" y2="110" stroke="#2a4a64" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="245" y1="142" x2="360" y2="114" stroke="#2a4a64" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Neck -->
  <path d="M175 128 C180 105 195 92 205 88 C212 100 210 115 205 128 Z" fill="#1a3a5a" opacity="0.95"/>
  <!-- Dragon head -->
  <path d="M190 88 C182 72 186 58 198 52 C210 46 224 52 228 64 C232 76 226 90 216 94 C206 98 194 98 190 88 Z" fill="#1a3a5a" opacity="0.95"/>
  <!-- Snout -->
  <path d="M210 78 C218 74 228 76 232 82 C236 88 232 94 226 94 L216 92 Z" fill="#162e4a" opacity="0.9"/>
  <!-- Nostril fire -->
  <ellipse cx="230" cy="88" rx="3" ry="2" fill="#E8B84B" opacity="0.7" filter="url(#softglow)"/>
  <ellipse cx="225" cy="90" rx="3" ry="2" fill="#E8B84B" opacity="0.5" filter="url(#softglow)"/>
  <!-- Dragon EYE -->
  <ellipse cx="204" cy="70" rx="7" ry="6" fill="#E8B84B" opacity="0.9"/>
  <ellipse cx="204" cy="70" rx="3" ry="4" fill="#0a0505"/>
  <circle cx="204" cy="70" r="10" fill="#E8B84B" opacity="0.2" filter="url(#blurSm)"/>
  <!-- Horns -->
  <path d="M198 54 L194 38 L200 42 Z" fill="#2a4a5a" opacity="0.85"/>
  <path d="M208 52 L212 36 L206 40 Z" fill="#2a4a5a" opacity="0.85"/>

  <!-- Dragon tail -->
  <path d="M148 195 C140 210 135 225 140 240 C148 252 158 248 162 235 C160 220 155 205 155 200 Z" fill="#162a40" opacity="0.85"/>
  <!-- Tail spikes -->
  <path d="M140 240 L130 252 L142 246 Z" fill="#1a3a5a" opacity="0.7"/>

  <!-- FIRE BREATH -->
  <path d="M232 84 C265 75 300 80 330 95 C310 100 275 95 245 90 Z" fill="#E8B84B" opacity="0.35" filter="url(#blurSm)"/>
  <path d="M230 86 C258 80 285 85 308 96 C290 100 265 97 242 92 Z" fill="#ff9a20" opacity="0.25" filter="url(#blurSm)"/>

  <!-- Ground / training area -->
  <ellipse cx="190" cy="210" rx="80" ry="15" fill="#1a3a5a" opacity="0.3" filter="url(#blurSm)"/>

  <!-- Rune circle on ground -->
  <circle cx="190" cy="205" r="45" fill="none" stroke="#C9943A" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="190" cy="205" r="40" fill="none" stroke="#C9943A" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="3 5"/>
  <!-- Rune marks -->
  <text x="190" y="168" text-anchor="middle" font-family="serif" font-size="8" fill="#C9943A" fill-opacity="0.3">᛭</text>
  <text x="145" y="212" text-anchor="middle" font-family="serif" font-size="8" fill="#C9943A" fill-opacity="0.3">ᚱ</text>
  <text x="235" y="212" text-anchor="middle" font-family="serif" font-size="8" fill="#C9943A" fill-opacity="0.3">ᚦ</text>

  <!-- Label -->
  <text x="240" y="308" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#C9943A" fill-opacity="0.4" letter-spacing="2">DRAČÍ TRÉNINK — 480 × 320 px</text>
</svg>
